<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Voyance AI — See the Web. Hear the Insight. In Seconds.</title>
  <meta name="description"
    content="Voyance navigates any website visually — no APIs, no DOM access. AI-powered visual web research orchestrated by Gemini + Google ADK, delivered through Vera's voice." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0A5FE8" />
  <!-- Google Fonts — preconnect first, then non-blocking stylesheet -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap" />
  </noscript>
  <!-- Open Graph (WhatsApp, Facebook, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Voyance AI" />
  <meta property="og:description"
    content="See the Web. Hear the Insight. In Seconds. AI-powered visual web research — speak a task, get a spoken briefing and comparison report." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Voyance AI" />
  <meta name="twitter:description"
    content="See the Web. Hear the Insight. In Seconds. AI-powered visual web research — speak a task, get a spoken briefing and comparison report." />
  <meta name="twitter:image" content="/og-image.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
